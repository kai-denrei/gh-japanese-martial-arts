<script>
var D={
tenshin:{t:"Tenshin Shin'yō ryu → Kodokan judo",h:'<div class="fr"><div class="fc"><div class="fcard"><strong>Fukuda Hachinosuke (1877–79)</strong><span>Kano\'s first master. Emphasized atemi waza (strikes to vital points) and included ne waza elements unusual in koryu of the era. Died 1879 before Kano could reach senior rank — forcing a change of school.</span></div><div class="fcard"><strong>Mataemon Iso (1879–81)</strong><span>Second master, known for kata application mastery. Also died in 1881. Two successive teacher deaths within two years pushed Kano to Kito ryu and shaped his drive to build a more durable institution.</span></div></div><div class="fc"><div class="fcard"><strong>Technical legacy in Kodokan</strong><span>The Kime-no-kata preserves many Tenshin Shin\'yo atemi and joint-lock sequences. This school provided the atemi, choking, and ne waza conceptual base; Kito ryu later added the throwing architecture.</span></div><div class="fcard"><strong>Character of the school</strong><span>One of the two largest koryu schools of the late Edo period. Its ne waza content was richer than most ryu of the era — directly influencing what Kano retained in kata while removing it from competitive randori.</span></div></div></div><div class="fn">Kano studied Tenshin Shin\'yo for roughly two years across two masters. The atemi and ground-control elements are preserved in Kodokan kata (Kime-no-kata, Katame-no-kata) even though they were excluded from randori competition.</div>'},
kito:{t:"Kito ryu → Kodokan throwing system",h:'<div class="fr"><div class="fc"><div class="fcard"><strong>Tsunetoshi Ikubo</strong><span>Kano\'s Kito ryu master from 1881 — just before the Kodokan opened in 1882. The most technically refined of Kano\'s teachers by his own account. An experienced instructor with lineage stretching deep into the Edo period.</span></div><div class="fcard"><strong>Throwing architecture</strong><span>Kito ryu was renowned for nage-waza (throwing). The kuzushi principle — breaking the opponent\'s balance before executing the throw — came primarily from this lineage and became the structural core of Kodokan judo.</span></div></div><div class="fc"><div class="fcard"><strong>The word "judo"</strong><span>Kito ryu was sometimes internally called "Kito ryu judo." Kano borrowed and reframed the term — do (the way) carrying the weight of ongoing self-improvement rather than technique acquisition alone.</span></div><div class="fcard"><strong>Kata preserved</strong><span>Several Kito ryu kata were adopted directly into the Kodokan curriculum, preserving classical throwing technique that was selectively excluded from randori on safety grounds.</span></div></div></div>'},
otherryu:{t:"Other classical ryu — expand this node",h:'<div class="fr"><div class="fc"><div class="fcard"><strong>Yagyushingan ryu</strong><span>Add your specific lineage connection and technical contribution here. This dashed rib is an open expansion slot — map any ryu into the pre-Kodokan influence web with school name, founding date, technical specialty, and connection to Kano\'s synthesis.</span></div><div class="fcard"><strong>Sekiguchi ryu</strong><span>One of the four major Edo-period schools. Rich ne waza curriculum; some techniques found their way into the Kodokan groundwork catalog indirectly through the classical schools Kano surveyed and cataloged.</span></div></div><div class="fc"><div class="fcard"><strong>Yoshin ryu / Tenjin Shinyo</strong><span>Known for atemi and strangling technique. Yukio Tani reportedly trained in this tradition — illustrating the cross-school synthesis common at the turn of the 20th century.</span></div><div class="fcard"><strong>How to add sub-bones</strong><span>Each ryu becomes a horizontal sub-bone off the dashed rib. Label: ryu name, founding date, technical specialty (ne waza / atemi / nage...), and the specific pathway into Kano\'s synthesis.</span></div></div></div><div class="fn">Kano was a synthesizer. His 1906 photograph with leading koryu masters — including Mataemon Tanabe — shows him actively cataloging the classical tradition. The Kodokan curriculum reflects selective absorption across many schools, not one pure lineage.</div>'},
randori:{t:"Randori — the training methodology revolution",h:'<div class="fr"><div class="fc"><div class="fcard"><strong>The core insight</strong><span>Classical ryu trained exclusively with kata — prearranged forms against compliant partners. Kano made live resisting sparring (randori) the daily backbone of practice. Students built real competence under pressure rather than theoretical knowledge of technique.</span></div><div class="fcard"><strong>The safety solution</strong><span>Dangerous techniques were removed from randori but not from the curriculum — preserved in kata. This allowed daily full-speed practice against resisting opponents. Classical ryu could not offer this without constant serious injury.</span></div></div><div class="fc"><div class="fcard"><strong>Why it dominated</strong><span>1886 Tokyo police tournament: Kodokan 13–0–2. Classical ryu had broader technique catalogs. Kodokan students executed far fewer techniques with far greater reliability under real competitive pressure. Depth-under-pressure beat breadth.</span></div></div></div><div class="fn">Danaher identifies randori as the single most important methodological innovation in martial arts history. The same principle appears independently in Fusen ryu\'s ne waza success and the Gracie academy — empirical live-resistance training consistently outperforms theoretical accumulation.</div>'},
fusen:{t:"Fusen ryu — the ne waza shock",h:'<div class="fr"><div class="fc"><div class="fcard"><strong>Mataemon Tanabe\'s strategy</strong><span>The Kodokan had almost no ground grappling before 1900. Tanabe designed a precise response: sit to the ground at the start of the match, and win there via submission hold.</span></div><div class="fcard"><strong>Result (~1891–1905)</strong><span>Fusen ryu defeated the previously unbeaten Kodokan in interschool competition. Every Kodokan loss came via submission hold on the ground. The only defeat in Kodokan challenge-match history.</span></div></div><div class="fc"><div class="fcard"><strong>The strategic logic</strong><span>Identify the phase where your opponent is weakest. Take the fight there. Win on your terms. This insight runs through Maeda\'s career and the Gracie system with identical structure, 80 years later.</span></div><div class="fcard"><strong>The ironic end</strong><span>Kano asked Tanabe to teach ne waza to the Kodokan. A ne waza explosion followed (1900–1925). Fusen ryu subsequently faded into obscurity — absorbed by the institution it had just beaten.</span></div></div></div>'},
catch:{t:"Catch wrestling — Western integration via Maeda",h:'<div class="fr"><div class="fc"><div class="fcard"><strong>Maeda\'s exposure</strong><span>During his European circuit — particularly in England — Maeda competed in catch wrestling matches without the gi. He explicitly absorbed what he found effective, including submission control positions outside the Kodokan syllabus.</span></div><div class="fcard"><strong>Documented technique transfer</strong><span>A photograph shows Maeda applying a half-nelson and hammer-lock — standard catch wrestling positions — incorporated into his teaching despite being foreign to Kodokan curriculum.</span></div></div><div class="fc"><div class="fcard"><strong>What it contributed</strong><span>No-gi control positions, different takedown entries, and leg-attack awareness. This broadened the submission arsenal beyond what the Kodokan\'s gi-based system emphasized — and passed into the Gracie lineage via Carlos.</span></div></div></div><div class="fn">Carlos Gracie received from Maeda a system already synthesizing Kodokan judo, Fusen ryu ne waza, and catch wrestling. BJJ\'s hybrid character was baked in from the source, not a later development.</div>'},
phases:{t:"Phases of combat — the unifying strategic theory",h:'<div class="fr"><div class="fc"><div class="fcard"><strong>The principle</strong><span>Combat divides into distinct phases — free movement, clinch, ground — each with its own technical requirements. Skill in one does not transfer to another. This asymmetry can be deliberately weaponized.</span></div><div class="fcard"><strong>Tanabe\'s version</strong><span>Identify Kodokan weakness: no ground game. Drag match to ground phase. Win via submission. Precisely executed — the Kodokan had no answer.</span></div></div><div class="fc"><div class="fcard"><strong>Maeda\'s extension</strong><span>Added the striker-opponent problem: use strikes/kicks to close the gap → clinch to neutralize → takedown → ground control → submission. A complete inter-phase transition system for real mixed fighting.</span></div><div class="fcard"><strong>UFC 1993 validation</strong><span>Royce Gracie\'s pattern: absorb exchange → clinch → takedown → ground control → submission. Opponents had no framework for the ground phase. The same theory, proven on the largest public stage in martial arts history.</span></div></div></div>'},
valetudo:{t:"Vale tudo — the empirical engine of BJJ",h:'<div class="fr"><div class="fc"><div class="fcard"><strong>Structure</strong><span>Open challenge matches beginning late 1920s, minimal rules. All styles invited. Opponents routinely much larger and stronger than the Gracie participants.</span></div><div class="fcard"><strong>Empirical refinement</strong><span>Every fight outcome fed back into the technical system. Techniques failing under real conditions were modified or discarded. Adversarial testing at full commitment — not theoretical debate.</span></div></div><div class="fc"><div class="fcard"><strong>Size disadvantage as design force</strong><span>Being constantly outweighed forced development of leverage-maximizing technique and the guard game. Fighting from the bottom was a necessity born from real conditions that became a signature strength.</span></div></div></div><div class="fn">Same structural pattern as Kano\'s tournament wins and Tanabe\'s challenges: open combat, systematically run, produces the most reliable data about what actually works. Every major advance in this lineage was empirically driven before it was theorized.</div>'},
guard:{t:"Guard system — offensive bottom game",h:'<div class="fr"><div class="fc"><div class="fcard"><strong>Origin in necessity</strong><span>Classical judo treated the bottom position as simply disadvantageous — to be escaped. The Gracies turned it into an offensive system because they were constantly underneath heavier opponents in vale tudo matches.</span></div><div class="fcard"><strong>The concept</strong><span>Closed guard: opponent held between your legs. Prevents the top player from controlling and striking while allowing the bottom player to attempt sweeps and submissions — offensive from underneath.</span></div></div><div class="fc"><div class="fcard"><strong>Fusen ryu antecedent</strong><span>Tanabe\'s fighters reportedly sat directly to the guard at the start of challenge matches. The Gracies formalized and expanded this into an entire sub-system — eventually branching into dozens of guard variants.</span></div><div class="fcard"><strong>Technical depth</strong><span>From closed guard: armbars, triangles, omoplatas, kimuras, guillotines, sweeps in both directions. An entire offensive game from a position most combat systems had no prepared answer to.</span></div></div></div>'},
positional:{t:"Positional hierarchy — BJJ's core theoretical framework",h:'<div class="fr"><div class="fc"><div class="fcard"><strong>The hierarchy</strong><span>Back mount → mount → knee on belly → side control → half guard → closed guard → bottom positions. Each graded by offensive potential, control quality, and submission opportunity.</span></div><div class="fcard"><strong>Point system logic</strong><span>Points awarded for positional advance — incentivizing climbing the hierarchy daily in training. Students internalized correct competitive habits as default movement patterns.</span></div></div><div class="fc"><div class="fcard"><strong>What judo and wrestling lacked</strong><span>Judo scored by pin criteria. Wrestling by back-exposure. Neither had a fully articulated hierarchy linking position to submission opportunity. BJJ mapped the entire topography of ground combat through this lens.</span></div></div></div>'},
takenouchi:{t:"Takenouchi ryu — first documented jujitsu school",h:'<div class="fr"><div class="fc"><div class="fcard"><strong>Founded 1532, Muromachi period</strong><span>Established by Takenouchi Hisamori. Distinguished from the weapons-dominant bujutsu ryu of the era by an unusually high proportion of empty-hand technique.</span></div><div class="fcard"><strong>Historical significance</strong><span>Almost universally cited as the foundational ancestor of the modern civilian self-defense style of jujitsu. Predates the 1588 sword ban that would force the broader population to develop similar empty-hand systems.</span></div></div><div class="fc"><div class="fcard"><strong>Legacy in the Edo period</strong><span>Over 700 koryu jujitsu schools documented in the Edo period. The Takenouchi ryu\'s conceptual framework — empty-hand combat as a complete art rather than a battlefield supplement — influenced many of them.</span></div></div></div>'}
};
