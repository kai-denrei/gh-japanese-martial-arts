<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Martial Arts — Grappling History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ───────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --measure: 64ch;
      --margin-w: 28ch;
      --gutter: 2.5rem;
      --xs: 0.25rem; --sm: 0.5rem; --md: 1rem; --lg: 2rem; --xl: 4rem; --xxl: 6rem;

      --bg: #faf8f4;
      --bg-panel: #f2efe8;
      --bg-tab-active: #faf8f4;
      --fg: #2c2416;
      --fg-muted: #7a6f5f;
      --fg-faint: #b5ad9e;
      --accent: #8b4513;
      --accent-light: #c4956a;
      --rule: #d6cfc2;
      --rule-heavy: #a89e8c;

      --font-body: 'Spectral', Georgia, 'Times New Roman', serif;
      --font-jp: 'Noto Serif JP', 'Hiragino Mincho Pro', 'Yu Mincho', serif;
      --font-ui: 'Inter', -apple-system, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
      --body-size: 1.0625rem;
      --lh: 1.65;

      --type-material: #b8860b;
      --type-literary: #6b5b95;
      --type-documentary: #2e86ab;
      --type-photographic: #3d7c47;
    }

    html { font-size: 100%; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      font-size: var(--body-size);
      line-height: var(--lh);
      color: var(--fg);
      background: var(--bg);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    /* CJK text styling */
    .jp-text { font-family: var(--font-jp); line-height: 1.8; }

    /* ── Page Frame ─────────────────────────────────── */
    .page {
      max-width: calc(var(--measure) + var(--margin-w) + var(--gutter));
      margin: 0 auto; padding: var(--xl) var(--lg);
    }

    /* ── Header ─────────────────────────────────────── */
    .eyebrow {
      font-family: var(--font-ui); font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: var(--sm);
    }
    .headline {
      font-size: clamp(2.2rem, 5vw, 3.4rem); font-weight: 700;
      line-height: 1.1; letter-spacing: -0.02em; color: var(--fg); margin-bottom: 0.15rem;
    }
    .subhead {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem); font-weight: 400; font-style: italic;
      color: var(--fg-muted); line-height: 1.35; margin-bottom: var(--lg);
    }
    .header-rule { border: none; border-top: 2px solid var(--fg); width: 4rem; margin-bottom: var(--lg); }
    .meta-line {
      font-family: var(--font-ui); font-size: 0.8rem; color: var(--fg-muted); margin-bottom: var(--md);
    }
    .meta-line span + span::before { content: ' · '; color: var(--fg-faint); }

    /* ── Tab Bar ────────────────────────────────────── */
    .tab-bar { display: flex; gap: var(--xs); border-bottom: 1px solid var(--rule); margin-bottom: var(--md); }
    .tab-bar button {
      font-family: var(--font-ui); font-size: 0.85rem; font-weight: 500;
      padding: var(--sm) var(--md); background: none;
      border: 1px solid transparent; border-bottom: none;
      border-radius: 4px 4px 0 0; color: var(--fg-muted);
      cursor: pointer; transition: all 0.15s; position: relative; bottom: -1px;
    }
    .tab-bar button:hover { color: var(--fg); background: var(--bg-panel); }
    .tab-bar button.active {
      color: var(--accent); background: var(--bg);
      border-color: var(--rule); border-bottom: 1px solid var(--bg);
    }
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Vertical Fishbone Timeline ────────────────── */
    .vfb-wrap { width: 100%; overflow-x: auto; overflow-y: visible; -webkit-overflow-scrolling: touch; }
    .vfb-svg { display: block; width: 100%; min-width: 300px; overflow: visible; }
    .vfb-svg text { font-family: var(--font-ui); }
    .vfb-svg .spine { stroke: var(--rule-heavy); stroke-width: 2; stroke-linecap: round; }
    .vfb-svg .bone { stroke: var(--rule); stroke-width: 1.2; stroke-linecap: round; transition: stroke 0.15s; }
    .vfb-svg .bone.active { stroke: var(--accent); stroke-width: 1.6; }
    .vfb-svg .spine-dot { transition: r 0.15s; }
    .vfb-svg .spine-dot.active { r: 7; }
    .vfb-svg .node-group { cursor: pointer; transition: opacity 0.3s; }
    .vfb-svg .node-group.faded { opacity: 0.12; pointer-events: none; }
    .vfb-svg .node-group:hover .card-bg { stroke: var(--accent-light); }
    .vfb-svg .node-group.active .card-bg { stroke: var(--accent); stroke-width: 1.5; }
    .vfb-svg .bone.faded { opacity: 0.06; }
    .vfb-svg .spine-dot.faded { opacity: 0.12; pointer-events: none; }
    .type-legend-item { cursor: pointer; user-select: none; transition: opacity 0.2s; padding: 2px 6px; border-radius: 8px; }
    .type-legend-item:hover { background: rgba(0,0,0,0.04); }
    .type-legend-item.dimmed { opacity: 0.35; }
    .vfb-svg .node-label { fill: var(--fg); font-size: 10px; font-weight: 600; }
    .vfb-svg .node-date { fill: var(--fg-faint); font-size: 8.5px; font-family: var(--font-mono); }
    .vfb-svg .era-label { fill: var(--accent); font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    @media (max-width: 600px) {
      .vfb-svg .node-label, .vfb-svg .node-label-jp { font-size: 8px !important; }
      .vfb-svg .node-date { font-size: 7px !important; }
      .vfb-svg .era-label { font-size: 8px !important; }
      .vfb-svg .influence-label { font-size: 6px !important; }
      .vfb-svg .lifespan-label { font-size: 5.5px !important; }
    }
    .vfb-svg .era-line { stroke: var(--accent-light); stroke-width: 0.5; stroke-dasharray: 3,3; }

    .type-legend {
      display: flex; flex-wrap: wrap; gap: var(--md); margin-bottom: var(--md);
      font-family: var(--font-ui); font-size: 0.72rem; color: var(--fg-muted);
    }
    .type-legend-item { display: flex; align-items: center; gap: 4px; }
    .type-legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .type-dot-material { background: var(--type-material); }
    .type-dot-literary { background: var(--type-literary); }
    .type-dot-documentary { background: var(--type-documentary); }
    .type-dot-photographic { background: var(--type-photographic); }

    /* ── Source Overlay ─────────────────────────────── */
    .overlay-backdrop {
      position: fixed; inset: 0; background: rgba(44, 36, 22, 0.5);
      z-index: 100; display: flex; align-items: center; justify-content: center;
      padding: 1rem; animation: fadeIn 0.2s ease;
      -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .overlay-card {
      background: var(--bg); border: 1px solid var(--rule); border-radius: 8px;
      width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto;
      padding: var(--lg) var(--md) var(--md); position: relative;
      animation: scaleIn 0.2s ease; box-shadow: 0 8px 32px rgba(44, 36, 22, 0.25);
      scrollbar-width: thin;
    }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    .overlay-close {
      position: sticky; top: 0; float: right;
      width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--rule);
      background: var(--bg); color: var(--fg-muted); font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      z-index: 2; transition: all 0.15s; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .overlay-close:hover { background: var(--bg-panel); color: var(--fg); border-color: var(--fg-muted); }

    .overlay-card img { width: 100%; border-radius: 4px; border: 1px solid var(--rule); margin-bottom: var(--sm); }
    .overlay-card .source-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 4px; line-height: 1.25; }
    .overlay-card .source-meta { font-family: var(--font-ui); font-size: 0.72rem; color: var(--fg-muted); margin-bottom: var(--sm); }
    .overlay-card .source-meta span + span::before { content: ' · '; }
    .overlay-card .source-description { font-size: 0.92rem; line-height: 1.6; margin-bottom: var(--sm); }
    .overlay-card .source-passage {
      border-left: 3px solid var(--accent-light);
      padding: var(--sm) 0 var(--sm) var(--md); margin-bottom: var(--sm);
    }
    .overlay-card .japanese-text { font-family: var(--font-jp); color: var(--fg-muted); margin-bottom: 4px; line-height: 1.8; }
    .overlay-card .translation-text { font-size: 0.9rem; }
    .overlay-card .translator-credit { font-family: var(--font-ui); font-size: 0.68rem; color: var(--fg-faint); margin-top: 4px; }

    .tag-row { display: flex; flex-wrap: wrap; gap: var(--xs); margin-bottom: var(--sm); }
    .tag {
      font-family: var(--font-ui); font-size: 0.7rem; font-weight: 500;
      padding: 2px 8px; border-radius: 12px; border: 1px solid var(--rule);
      color: var(--fg-muted); cursor: pointer; transition: all 0.15s; text-decoration: none;
    }
    .tag:hover { border-color: var(--accent); color: var(--accent); }
    .tag.technique-tag { background: rgba(139,69,19,0.06); }
    .tag.term-tag { background: rgba(107,91,149,0.06); border-color: rgba(107,91,149,0.3); color: var(--type-literary); }
    .tag.term-tag:hover { border-color: var(--type-literary); }

    .evidence-block {
      background: var(--bg-panel); border: 1px solid var(--rule); border-radius: 4px;
      padding: var(--md); margin-top: var(--md); font-size: 0.85rem;
    }
    .evidence-block h4 {
      font-family: var(--font-ui); font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-muted); margin-bottom: var(--sm);
    }
    .evidence-block ul { padding-left: 1.2em; margin-bottom: var(--sm); }
    .evidence-block li { font-size: 0.82rem; line-height: 1.5; margin-bottom: 2px; }
    .evidence-block .proves { color: var(--type-photographic); }
    .evidence-block .cannot-prove { color: var(--fg-muted); }
    .evidence-block .reliability {
      font-style: italic; color: var(--fg-muted); font-size: 0.8rem;
      border-top: 1px solid var(--rule); padding-top: var(--sm); margin-top: var(--sm);
    }
    .source-link-ext {
      font-family: var(--font-ui); font-size: 0.75rem; color: var(--accent);
      text-decoration: none; margin-top: var(--sm); display: inline-block;
    }
    .source-link-ext:hover { text-decoration: underline; }

    body.overlay-open { overflow: hidden; }

    /* ── Evidence Index ─────────────────────────────── */
    .evidence-index { border-top: 2px solid var(--rule-heavy); padding-top: var(--lg); margin-top: var(--xl); }
    .evidence-index h3 {
      font-family: var(--font-ui); font-size: 0.85rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-muted); margin-bottom: var(--md);
    }
    .evidence-index-item { margin-bottom: var(--sm); font-size: 0.85rem; line-height: 1.5; }
    .evidence-index-item .claim { color: var(--fg); }
    .evidence-index-item .citing { font-family: var(--font-ui); font-size: 0.7rem; color: var(--fg-muted); }
    .evidence-index-item .citing a { color: var(--accent); text-decoration: none; cursor: pointer; }
    .evidence-index-item .citing a:hover { text-decoration: underline; }

    /* ── Lexicon ────────────────────────────────────── */
    .lexicon-controls {
      display: flex; flex-wrap: wrap; gap: var(--sm); margin-bottom: var(--lg); align-items: center;
    }
    .lexicon-search {
      font-family: var(--font-ui); font-size: 0.85rem;
      padding: var(--sm) var(--md); border: 1px solid var(--rule);
      border-radius: 4px; background: var(--bg); color: var(--fg);
      flex: 1; min-width: 200px;
    }
    .lexicon-search:focus { outline: none; border-color: var(--accent); }
    .lexicon-search::placeholder { color: var(--fg-faint); }
    .lexicon-count { font-family: var(--font-ui); font-size: 0.72rem; color: var(--fg-faint); }

    #lex-filters { display: flex; flex-wrap: wrap; gap: var(--xs); }
    .filter-btn {
      font-family: var(--font-ui); font-size: 0.72rem; font-weight: 500;
      padding: 2px 10px; border: 1px solid var(--rule); border-radius: 12px;
      background: none; color: var(--fg-muted); cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .lexicon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: var(--md); }
    .lex-card {
      border: 1px solid var(--rule); border-radius: 6px; padding: var(--md);
      background: var(--bg); transition: all 0.2s;
    }
    .lex-card:hover { border-color: var(--accent-light); box-shadow: 0 2px 8px rgba(139,69,19,0.08); }
    .lex-card.highlight { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(139,69,19,0.15); }
    .lex-category {
      font-family: var(--font-ui); font-size: 0.6rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-faint);
      margin-bottom: var(--xs); display: block;
    }
    .lex-japanese { font-family: var(--font-jp); font-size: 1.6rem; font-weight: 600; color: var(--fg); line-height: 1.3; }
    .lex-romaji { font-family: var(--font-ui); font-size: 0.85rem; font-weight: 500; color: var(--accent); margin-bottom: 2px; }
    .lex-literal { font-style: italic; font-size: 0.82rem; color: var(--fg-muted); margin-bottom: var(--sm); }
    .lex-definition { font-size: 0.85rem; line-height: 1.55; margin-bottom: var(--sm); }
    .lex-modern { font-family: var(--font-ui); font-size: 0.72rem; color: var(--fg-faint); margin-bottom: var(--sm); }
    .lex-sources { display: flex; flex-wrap: wrap; gap: var(--xs); }
    .lex-source-link {
      font-family: var(--font-ui); font-size: 0.65rem; color: var(--accent);
      cursor: pointer; text-decoration: none; padding: 1px 6px;
      border: 1px solid rgba(139,69,19,0.2); border-radius: 8px;
    }
    .lex-source-link:hover { border-color: var(--accent); background: rgba(139,69,19,0.04); }

    /* ── Centerpiece Matrix ────────────────────────── */
    .centerpiece-intro { margin-bottom: var(--lg); font-size: 0.95rem; line-height: 1.65; }
    .matrix-wrap { overflow-x: auto; margin-bottom: var(--lg); }
    .matrix {
      width: 100%; border-collapse: collapse; font-size: 0.8rem; line-height: 1.5;
    }
    .matrix th {
      font-family: var(--font-ui); font-size: 0.72rem; font-weight: 600;
      text-align: left; padding: var(--sm) var(--sm); vertical-align: top;
      border-bottom: 2px solid var(--rule-heavy); background: var(--bg-panel);
      min-width: 130px; max-width: 180px;
    }
    .matrix th .author-link { color: var(--accent); cursor: pointer; text-decoration: none; display: block; }
    .matrix th .author-link:hover { text-decoration: underline; }
    .matrix th .work-title { display: block; font-weight: 400; font-style: italic; color: var(--fg-muted); font-size: 0.65rem; }
    .matrix th .mode-label { display: block; font-weight: 400; color: var(--fg-faint); font-size: 0.6rem; margin-top: 2px; }
    .matrix td {
      padding: var(--sm); vertical-align: top; border-bottom: 1px solid var(--rule);
      font-size: 0.78rem; line-height: 1.5;
    }
    .matrix .slot-label {
      font-family: var(--font-ui); font-weight: 600; font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.04em; color: var(--fg-muted);
      min-width: 100px; background: var(--bg-panel);
    }
    .matrix .empty-cell { color: var(--fg-faint); text-align: center; }

    /* Mobile cards for matrix */
    .matrix-cards { display: none; }
    @media (max-width: 768px) {
      .matrix-wrap { display: none; }
      .matrix-cards { display: block; }
    }
    .matrix-card {
      border: 1px solid var(--rule); border-radius: 6px; padding: var(--md);
      margin-bottom: var(--md); background: var(--bg);
    }
    .matrix-card h4 {
      font-family: var(--font-ui); font-size: 0.8rem; font-weight: 600;
      color: var(--accent); margin-bottom: var(--sm); text-transform: uppercase; letter-spacing: 0.04em;
    }
    .matrix-card-passage { margin-bottom: var(--sm); padding-bottom: var(--sm); border-bottom: 1px solid var(--rule); }
    .matrix-card-passage:last-child { border-bottom: none; }
    .matrix-card-author {
      font-family: var(--font-ui); font-size: 0.7rem; font-weight: 600; color: var(--fg-muted); margin-bottom: 2px;
    }
    .matrix-card-text { font-size: 0.82rem; line-height: 1.5; }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 600px) {
      .page { padding: var(--md) var(--sm); }
      .headline { font-size: 1.8rem; }
      .subhead { font-size: 0.95rem; margin-bottom: var(--sm); }
      .header-rule { margin-bottom: var(--sm); }
      .lexicon-grid { grid-template-columns: 1fr; }
      .tab-bar { gap: 0; }
      .tab-bar button { font-size: 0.75rem; padding: var(--xs) var(--sm); }
      .overlay-card { padding: var(--md) var(--sm) var(--sm); max-height: 92vh; }
      .overlay-card .source-title { font-size: 1rem; }
      .overlay-card .source-description { font-size: 0.85rem; }
      .overlay-card img { max-height: 200px; object-fit: cover; }
      .evidence-block { font-size: 0.78rem; padding: var(--sm); }
      .vfb-tooltip { max-width: 180px; font-size: 0.7rem; }
      .vfb-tooltip .tt-title { font-size: 0.75rem; }
      .type-legend { font-size: 0.62rem; gap: var(--sm); }
      .type-legend-item { padding: 1px 4px; }
      .lexicon-search { font-size: 0.8rem; min-width: 150px !important; }
    }
    @media (max-width: 380px) {
      .page { padding: var(--sm) var(--xs); }
      .headline { font-size: 1.5rem; }
      .tab-bar button { font-size: 0.68rem; padding: 3px 6px; }
    }

    /* ── Lifespan Bands ───────────────────────────── */
    .vfb-svg .lifespan-band {
      opacity: 0.07;
      transition: opacity 0.2s;
    }
    .vfb-svg .lifespan-band.extant { opacity: 0.09; }
    .vfb-svg .lifespan-band:hover { opacity: 0.18; }
    .vfb-svg .lifespan-label {
      font-family: 'Noto Serif JP', serif;
      font-size: 7px;
      fill: var(--fg-faint);
      opacity: 0.5;
    }
    .vfb-svg .spine-icon {
      font-size: 10px;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }

    /* ── Timeline Hover Tooltip ─────────────────── */
    .vfb-tooltip {
      position: absolute;
      pointer-events: none;
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 8px 12px;
      box-shadow: 0 4px 16px rgba(44, 36, 22, 0.18);
      z-index: 50;
      max-width: 240px;
      opacity: 0;
      transition: opacity 0.15s;
      font-family: var(--font-ui);
    }
    .vfb-tooltip.visible { opacity: 1; }
    .vfb-tooltip .tt-title { font-size: 0.82rem; font-weight: 600; color: var(--fg); margin-bottom: 2px; }
    .vfb-tooltip .tt-date { font-size: 0.7rem; color: var(--accent); margin-bottom: 4px; font-family: var(--font-mono); }
    .vfb-tooltip .tt-desc { font-size: 0.7rem; color: var(--fg-muted); line-height: 1.4; }

    .vfb-svg .node-label-jp {
      fill: var(--fg);
      font-size: 11px;
      font-weight: 600;
      font-family: 'Noto Serif JP', 'Hiragino Mincho Pro', serif;
    }

    /* ── Influence Lines ──────────────────────────── */
    .vfb-svg .influence-line {
      fill: none;
      stroke: var(--accent-light);
      stroke-width: 1.2;
      stroke-dasharray: 4,3;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .vfb-svg .influence-line:hover { opacity: 1; stroke-width: 1.6; }
    .vfb-svg .influence-arrow {
      fill: var(--accent-light);
      opacity: 0.6;
    }
    .vfb-svg .influence-label {
      fill: var(--fg-faint);
      font-size: 7px;
      font-style: italic;
    }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
  </style>
</head>
<body>
  <div class="page">
    <p class="eyebrow">Grappling History</p>
    <h1 class="headline">Japanese Martial Arts</h1>
    <p class="subhead">Sumo, Jujutsu, Judo & the Path to MMA — through primary sources</p>
    <hr class="header-rule">
    <p class="meta-line">
      <span>712 CE – 2007</span>
      <span>Japan</span>
      <span>Literary, material, documentary & photographic evidence</span>
    </p>

    <nav class="tab-bar" role="tablist">
      <button class="active" data-tab="sources" role="tab" aria-selected="true">Sources</button>
      <button data-tab="lexicon" role="tab" aria-selected="false">Lexicon</button>
      <button data-tab="centerpiece" role="tab" aria-selected="false">Kano Synthesis</button>
    </nav>

    <!-- SOURCES TAB -->
    <div id="panel-sources" class="panel active">
      <div style="display:flex;gap:var(--sm);align-items:center;margin-bottom:var(--sm);flex-wrap:wrap">
        <input type="text" class="lexicon-search" id="source-search" placeholder="Search sources (Japanese, English, date, technique)..." style="flex:1;min-width:200px">
        <span id="source-count" style="font-family:var(--font-ui);font-size:0.72rem;color:var(--fg-faint)"></span>
      </div>
      <div id="source-results" style="display:none;margin-bottom:var(--md)"></div>
      <div style="display:flex;gap:var(--sm);align-items:center;flex-wrap:wrap;margin-bottom:var(--sm)">
        <div class="type-legend" id="type-legend" style="margin-bottom:0"></div>
        <span style="font-family:var(--font-ui);font-size:0.65rem;color:var(--fg-faint);margin-left:auto">click to filter</span>
      </div>
      <div class="vfb-wrap" style="position:relative">
        <svg class="vfb-svg" id="vfb-svg"></svg>
        <div class="vfb-tooltip" id="vfb-tooltip"></div>
      </div>
      <div id="overlay-container"></div>
      <div id="evidence-index" class="evidence-index" style="display:none"></div>
    </div>

    <!-- LEXICON TAB -->
    <div id="panel-lexicon" class="panel">
      <div class="lexicon-controls">
        <input type="text" class="lexicon-search" id="lex-search" placeholder="Search terms (Japanese, romaji, English, or modern parallel)...">
        <div id="lex-filters"></div>
        <span class="lexicon-count" id="lex-count"></span>
      </div>
      <div class="lexicon-grid" id="lex-grid"></div>
    </div>

    <!-- CENTERPIECE TAB -->
    <div id="panel-centerpiece" class="panel">
      <div class="centerpiece-intro" id="centerpiece-intro"></div>
      <div class="matrix-wrap"><table class="matrix" id="centerpiece-matrix"></table></div>
      <div class="matrix-cards" id="centerpiece-cards"></div>
    </div>
  </div>

  <script>
    let DATA = null;
    let activeSource = null;

    async function init() {
      const res = await fetch('./data.json');
      DATA = await res.json();
      renderTabs();
      renderTimeline();
      renderEvidenceIndex();
      renderLexicon();
      renderCenterpiece();
      initSourceSearch();
      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(renderTimeline, 200);
      });
    }

    /* ── Tab Switching ─────────────────────────────── */
    function renderTabs() {
      document.querySelectorAll('.tab-bar button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-bar button').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          btn.setAttribute('aria-selected', 'true');
          document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
        });
      });
    }

    function switchToTab(tabName) {
      document.querySelectorAll('.tab-bar button').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      const btn = document.querySelector(`.tab-bar button[data-tab="${tabName}"]`);
      if (btn) { btn.classList.add('active'); btn.setAttribute('aria-selected', 'true'); }
      document.getElementById('panel-' + tabName).classList.add('active');
    }

    function navigateToSource(sourceId) { switchToTab('sources'); showSourceOverlay(sourceId); }
    function navigateToLexicon(termId) {
      closeSourceOverlay();
      switchToTab('lexicon');
      document.getElementById('lex-search').value = '';
      filterLexicon();
      setTimeout(() => {
        const card = document.querySelector(`.lex-card[data-id="${termId}"]`);
        if (card) {
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          card.classList.add('highlight');
          setTimeout(() => card.classList.remove('highlight'), 2000);
        }
      }, 100);
    }

    /* ── SVG helpers ──────────────────────────────── */
    const NS = 'http://www.w3.org/2000/svg';
    function svgEl(tag, attrs) {
      const el = document.createElementNS(NS, tag);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
      return el;
    }
    function wrapText(text, maxChars) {
      const words = text.split(' ');
      const lines = []; let cur = '';
      words.forEach(w => {
        if ((cur + ' ' + w).trim().length > maxChars && cur) { lines.push(cur.trim()); cur = w; }
        else cur = (cur + ' ' + w).trim();
      });
      if (cur) lines.push(cur.trim());
      return lines.slice(0, 2);
    }

    const TYPE_COLORS = {
      material: 'var(--type-material)', literary: 'var(--type-literary)',
      documentary: 'var(--type-documentary)', photographic: 'var(--type-photographic)'
    };
    const LANE_COLORS = {
      school: 'var(--type-literary)',
      person: 'var(--type-photographic)',
      event: 'var(--type-documentary)',
      artifact: 'var(--type-material)',
      competition: '#c0392b'
    };
    const ERAS = [
      { start: 700, label: 'Nara / Heian' },
      { start: 1500, label: 'Sengoku / Edo' },
      { start: 1868, label: 'Meiji' },
      { start: 1912, label: 'Taishō / Shōwa' },
    ];

    /* ── Vertical Fishbone Timeline ────────────────── */
    function renderTimeline() {
      const svg = document.getElementById('vfb-svg');
      svg.innerHTML = '';
      const sources = [...DATA.sources].sort((a, b) => a.date - b.date);

      const containerW = svg.parentElement.clientWidth || 600;
      const VIEW_W = Math.max(280, Math.min(containerW, 700));
      const SPINE_X = VIEW_W / 2;
      const isMobile = VIEW_W < 400;
      const isNarrow = VIEW_W < 340;
      const TOP_PAD = 20;
      const NODE_SPACING = isMobile ? 38 : 44;
      const THUMB_SIZE = isMobile ? 28 : 40;
      const MAX_LABEL_CHARS = isNarrow ? 8 : isMobile ? 11 : 18;
      const CLUSTER_DIST = 15;

      // Lane-based bone lengths: schools near spine, people at edges
      // Scale down on mobile to keep labels in frame
      const mobScale = isMobile ? 0.7 : 1;
      const LANE_CONFIG = {
        school:      { lenMin: 0.12 * mobScale, lenMax: 0.18 * mobScale, angleMin: 12, angleMax: 28 },
        event:       { lenMin: 0.18 * mobScale, lenMax: 0.26 * mobScale, angleMin: 16, angleMax: 35 },
        artifact:    { lenMin: 0.20 * mobScale, lenMax: 0.28 * mobScale, angleMin: 18, angleMax: 35 },
        person:      { lenMin: 0.28 * mobScale, lenMax: 0.38 * mobScale, angleMin: 14, angleMax: 32 },
        competition: { lenMin: 0.20 * mobScale, lenMax: 0.28 * mobScale, angleMin: 16, angleMax: 35 },
      };
      const DEFAULT_LANE = { lenMin: 0.20, lenMax: 0.28, angleMin: 18, angleMax: 38 };

      const legend = document.getElementById('type-legend');
      const legendItems = [
        { cls: 'school', label: 'Schools / Ryū', color: 'var(--type-literary)' },
        { cls: 'person', label: 'Key People', color: 'var(--type-photographic)' },
        { cls: 'competition', label: 'Competitions', color: '#c0392b' },
        { cls: 'event', label: 'Events', color: 'var(--type-documentary)' },
        { cls: 'artifact', label: 'Artifacts', color: 'var(--type-material)' },
      ];
      const activeLanes = new Set(legendItems.map(l => l.cls));

      legend.innerHTML = legendItems.map(t =>
        `<span class="type-legend-item" data-lane="${t.cls}"><span class="type-legend-dot" style="background:${t.color}"></span>${t.label}</span>`
      ).join('');

      function applyLaneFilter() {
        const showAll = activeLanes.size === legendItems.length;
        document.querySelectorAll('.node-group').forEach(g => {
          const src = DATA.sources.find(s => s.id === g.dataset.id);
          if (!src) return;
          const visible = showAll || activeLanes.has(src.lane);
          g.classList.toggle('faded', !visible);
        });
        document.querySelectorAll('.spine-dot').forEach(d => {
          const src = DATA.sources.find(s => s.id === d.dataset.id);
          if (!src) return;
          const visible = showAll || activeLanes.has(src.lane);
          d.classList.toggle('faded', !visible);
        });
        document.querySelectorAll('.bone').forEach(b => {
          const src = DATA.sources.find(s => s.id === b.dataset.id);
          if (!src) return;
          const visible = showAll || activeLanes.has(src.lane);
          b.classList.toggle('faded', !visible);
        });
        legend.querySelectorAll('.type-legend-item').forEach(el => {
          el.classList.toggle('dimmed', !activeLanes.has(el.dataset.lane));
        });
      }

      legend.querySelectorAll('.type-legend-item').forEach(el => {
        el.addEventListener('click', () => {
          const lane = el.dataset.lane;
          if (activeLanes.size === legendItems.length) {
            // All active → solo this lane
            activeLanes.clear();
            activeLanes.add(lane);
          } else if (activeLanes.has(lane) && activeLanes.size === 1) {
            // Only this lane active → show all
            legendItems.forEach(l => activeLanes.add(l.cls));
          } else if (activeLanes.has(lane)) {
            // Multiple active, toggle off
            activeLanes.delete(lane);
          } else {
            // Toggle on
            activeLanes.add(lane);
          }
          applyLaneFilter();
        });
      });

      // Date-proportional Y positioning with compressed gap
      const lanePriority = { school: 0, competition: 1, event: 2, artifact: 3, person: 4 };
      const MIN_GAP = isMobile ? 42 : 52;
      const dateMin = sources[0].date;
      const dateMax = sources[sources.length - 1].date;

      // Compress the empty 726–1392 gap (Ryukyu tode is now at 1392)
      const GAP_START = 730;   // after sechie-zumo
      const GAP_END = 1390;    // before Ryukyu Chinese influence
      const GAP_VISUAL_PX = 45; // compressed gap rendered as this many px
      const BREAK_LABEL = '≈ 660 years';

      // Compute effective date: remap dates so the gap is collapsed
      function effectiveDate(date) {
        if (date <= GAP_START) return date;
        if (date >= GAP_END) return GAP_START + (date - GAP_END);
        // Inside the gap (shouldn't happen with our data)
        return GAP_START;
      }

      const effMin = effectiveDate(dateMin);
      const effMax = effectiveDate(dateMax);
      const effRange = effMax - effMin || 1;

      const IDEAL_H = Math.max(sources.length * NODE_SPACING, effRange * 1.2);

      const idealPositions = sources.map(src => {
        const eff = effectiveDate(src.date);
        let idealY = TOP_PAD + ((eff - effMin) / effRange) * IDEAL_H;
        // Add the visual gap space for items after the break
        if (src.date >= GAP_END) idealY += GAP_VISUAL_PX;
        return { src, idealY };
      });

      // Second pass: enforce minimum gap — push down if too close
      for (let i = 1; i < idealPositions.length; i++) {
        const gap = idealPositions[i].idealY - idealPositions[i - 1].idealY;
        if (gap < MIN_GAP) {
          idealPositions[i].idealY = idealPositions[i - 1].idealY + MIN_GAP;
        }
      }

      // Build clusters for same-date items (items within 2 years share a spine Y)
      const clusters = [];
      idealPositions.forEach(ip => {
        const existing = clusters.find(c => Math.abs(c.date - ip.src.date) <= 2);
        if (existing) {
          existing.items.push(ip);
        } else {
          clusters.push({ date: ip.src.date, items: [ip] });
        }
      });

      // Position: same-date items share a spine Y, fan out left/right
      const positioned = [];
      clusters.forEach(cluster => {
        // All items in cluster share the Y of the first item
        const spineY = cluster.items[0].idealY;
        // Sort within cluster: schools near spine, people at edges
        cluster.items.sort((a, b) =>
          (lanePriority[a.src.lane] || 1) - (lanePriority[b.src.lane] || 1)
        );
        let leftCount = 0, rightCount = 0;
        cluster.items.forEach((ip, idx) => {
          const goRight = ip.src.force_side === 'right' ? true
            : ip.src.force_side === 'left' ? false
            : leftCount > rightCount;
          if (goRight) rightCount++; else leftCount++;

          const lane = LANE_CONFIG[ip.src.lane] || DEFAULT_LANE;
          const sc = goRight ? rightCount - 1 : leftCount - 1;
          const t = Math.min(sc / 3, 1);
          const boneLen = VIEW_W * (lane.lenMin + t * (lane.lenMax - lane.lenMin));
          const angleDeg = lane.angleMin + t * (lane.angleMax - lane.angleMin);
          const angle = angleDeg * Math.PI / 180;

          // Offset Y within cluster — full MIN_GAP between items
          const clusterOffsetY = idx * MIN_GAP;
          positioned.push({ src: ip.src, y: spineY + clusterOffsetY, right: goRight, angle, boneLen });
        });
      });

      // Final pass: enforce MIN_GAP between all positioned nodes (sorted by Y)
      positioned.sort((a, b) => a.y - b.y);
      for (let i = 1; i < positioned.length; i++) {
        if (positioned[i].y - positioned[i - 1].y < MIN_GAP) {
          positioned[i].y = positioned[i - 1].y + MIN_GAP;
        }
      }

      const lastY = positioned.length > 0 ? positioned[positioned.length - 1].y : TOP_PAD;
      const totalH = lastY + 60;
      svg.setAttribute('viewBox', `0 0 ${VIEW_W} ${totalH}`);

      // Find Y position of the gap break
      const gapNode = positioned.find(p => p.src.date >= GAP_END);
      const preGapNode = [...positioned].reverse().find(p => p.src.date <= GAP_START);
      const breakY1 = preGapNode ? preGapNode.y + 20 : TOP_PAD + 60;
      const breakY2 = gapNode ? gapNode.y - 20 : breakY1 + GAP_VISUAL_PX;
      const breakMid = (breakY1 + breakY2) / 2;

      // Draw spine in two segments with a break
      svg.appendChild(svgEl('line', { x1: SPINE_X, y1: 5, x2: SPINE_X, y2: breakY1, class: 'spine' }));
      svg.appendChild(svgEl('line', { x1: SPINE_X, y1: breakY2, x2: SPINE_X, y2: totalH - 10, class: 'spine' }));

      // Zigzag break marker
      const zw = 8; // zigzag width
      const zs = 5; // zigzag step height
      const zy = breakY1;
      const zigzagPts = [];
      let zcur = zy;
      for (let i = 0; zcur < breakY2; i++) {
        const xoff = (i % 2 === 0) ? -zw : zw;
        zigzagPts.push(`${SPINE_X + xoff},${zcur}`);
        zcur += zs;
      }
      zigzagPts.push(`${SPINE_X},${breakY2}`);
      const zigzag = svgEl('polyline', {
        points: zigzagPts.join(' '),
        fill: 'none',
        stroke: 'var(--rule-heavy)',
        'stroke-width': '1.5',
        'stroke-linecap': 'round',
        'stroke-linejoin': 'round'
      });
      svg.appendChild(zigzag);

      // Break label
      const breakLabel = svgEl('text', {
        x: SPINE_X + zw + 8, y: breakMid + 3,
        'text-anchor': 'start',
        style: 'font-family:var(--font-ui);font-size:8px;fill:var(--fg-faint);font-style:italic'
      });
      breakLabel.textContent = BREAK_LABEL;
      svg.appendChild(breakLabel);

      ERAS.forEach(era => {
        const node = positioned.find(p => p.src.date >= era.start);
        if (!node) return;
        const eraY = node.y - 20;
        if (eraY < 10) return;
        svg.appendChild(svgEl('line', { x1: 10, y1: eraY, x2: VIEW_W - 10, y2: eraY, class: 'era-line' }));
        const lbl = svgEl('text', { x: SPINE_X, y: eraY - 4, 'text-anchor': 'middle', class: 'era-label' });
        lbl.textContent = era.label;
        svg.appendChild(lbl);
      });

      // ── Lifespan Bands (drawn behind nodes) ──────
      // Map dates to Y positions — interpolate from positioned nodes
      function dateToY(date) {
        if (positioned.length === 0) return TOP_PAD;
        // Clamp to range
        if (date <= positioned[0].src.date) return positioned[0].y;
        if (date >= positioned[positioned.length - 1].src.date) return positioned[positioned.length - 1].y;
        // Handle dates inside the compressed gap
        if (date > GAP_START && date < GAP_END) {
          const t = (date - GAP_START) / (GAP_END - GAP_START);
          return breakY1 + t * (breakY2 - breakY1);
        }
        // Interpolate between nearest positioned nodes
        for (let i = 0; i < positioned.length - 1; i++) {
          const a = positioned[i], b = positioned[i + 1];
          if (date >= a.src.date && date <= b.src.date) {
            const t = (date - a.src.date) / (b.src.date - a.src.date);
            return a.y + t * (b.y - a.y);
          }
        }
        return positioned[positioned.length - 1].y;
      }

      const schoolsWithPeriods = positioned.filter(p => p.src.lane === 'school' && p.src.active_period);
      const BAND_W = 10;
      const BAND_GAP = 2;
      let leftBandIdx = 0, rightBandIdx = 0;

      // Pastel blue shades for extant, pastel grey shades for extinct
      const EXTANT_COLORS = ['#1a5276', '#21618c', '#2874a6', '#2e86c1', '#3498db', '#5dade2', '#85c1e9', '#aed6f1', '#d4e6f1', '#1b4f72'];
      const EXTINCT_COLORS = ['#4a4a4a', '#616161', '#787878', '#909090', '#a8a8a8', '#bfbfbf'];
      let extantIdx = 0, extinctIdx = 0;

      schoolsWithPeriods.forEach(p => {
        const period = p.src.active_period;
        const startY = dateToY(period.start);
        const endY = period.extant ? totalH - 10 : dateToY(period.end);
        const bandH = Math.max(endY - startY, 4);

        // Stagger: alternate left/right of spine
        const goRight = leftBandIdx <= rightBandIdx;
        const idx = goRight ? rightBandIdx : leftBandIdx;
        if (goRight) rightBandIdx++; else leftBandIdx++;

        const offset = (idx + 1) * (BAND_W + BAND_GAP);
        const bandX = goRight ? SPINE_X + offset : SPINE_X - offset - BAND_W;

        const bandColor = period.extant
          ? EXTANT_COLORS[extantIdx++ % EXTANT_COLORS.length]
          : EXTINCT_COLORS[extinctIdx++ % EXTINCT_COLORS.length];

        // Band rectangle
        const rect = svgEl('rect', {
          x: bandX, y: startY, width: BAND_W, height: bandH,
          rx: 3, fill: bandColor,
          class: 'lifespan-band' + (period.extant ? ' extant' : ''),
          style: 'cursor:pointer'
        });
        rect.addEventListener('click', () => { showInfluenceLines(p.src.id); showSourceOverlay(p.src.id); });
        svg.appendChild(rect);

        // Fade-out at bottom for extinct schools
        if (!period.extant) {
          const gradId = 'fade-' + p.src.id.replace(/[^a-z0-9]/g, '');
          const defs = svgEl('defs', {});
          const grad = svgEl('linearGradient', { id: gradId, x1: 0, y1: 0, x2: 0, y2: 1 });
          const s1 = svgEl('stop', { offset: '0%', 'stop-color': bandColor, 'stop-opacity': '0.12' });
          const s2 = svgEl('stop', { offset: '70%', 'stop-color': bandColor, 'stop-opacity': '0.08' });
          const s3 = svgEl('stop', { offset: '100%', 'stop-color': bandColor, 'stop-opacity': '0' });
          grad.appendChild(s1); grad.appendChild(s2); grad.appendChild(s3);
          defs.appendChild(grad);
          svg.appendChild(defs);
          rect.setAttribute('fill', `url(#${gradId})`);
          rect.setAttribute('opacity', '1');
          rect.classList.remove('lifespan-band');
          rect.style.cursor = 'pointer';
          rect.addEventListener('click', () => { showInfluenceLines(p.src.id); showSourceOverlay(p.src.id); });
        }

        // Hover: show name tooltip on band
        const bandName = (p.src.title.split('—')[0] || '').trim();
        let bandTip = null;
        rect.addEventListener('mouseenter', (e) => {
          const wr2 = svg.parentElement.getBoundingClientRect();
          bandTip = document.getElementById('vfb-tooltip');
          bandTip.innerHTML = `<div class="tt-title" style="font-size:0.75rem;margin:0">${p.src.name_japanese || ''} ${bandName}</div>`;
          const bx = e.clientX - wr2.left + 14;
          const by = e.clientY - wr2.top - 30;
          bandTip.style.left = Math.min(bx, wr2.width - 180) + 'px';
          bandTip.style.top = Math.max(by, 4) + 'px';
          bandTip.classList.add('visible');
        });
        rect.addEventListener('mousemove', (e) => {
          if (!bandTip) return;
          const wr2 = svg.parentElement.getBoundingClientRect();
          const bx = e.clientX - wr2.left + 14;
          const by = e.clientY - wr2.top - 30;
          bandTip.style.left = Math.min(bx, wr2.width - 180) + 'px';
          bandTip.style.top = Math.max(by, 4) + 'px';
        });
        rect.addEventListener('mouseleave', () => {
          if (bandTip) bandTip.classList.remove('visible');
          bandTip = null;
        });
      });

      // Tooltip element
      const tooltip = document.getElementById('vfb-tooltip');

      function showTooltip(src, clientX, clientY) {
        const englishName = (src.title.split('—')[0] || '').trim();
        const periodLine = src.period_display || src.date_display;
        const practLine = src.practitioners ? `<div class="tt-desc" style="margin-top:3px;color:var(--accent)">⟐ ${src.practitioners}</div>` : '';
        tooltip.innerHTML = `
          <div class="tt-title">${englishName}</div>
          <div class="tt-date">${periodLine}</div>
          <div class="tt-desc">${src.description.substring(0, 120)}${src.description.length > 120 ? '...' : ''}</div>
          ${practLine}
        `;
        // Recalculate wrapper rect each time (handles scroll)
        const wr = svg.parentElement.getBoundingClientRect();
        let x = clientX - wr.left + 14;
        let y = clientY - wr.top + 14;
        // Clamp so tooltip stays within wrapper bounds
        const tw = 240, th = 100;
        if (x + tw > wr.width) x = clientX - wr.left - tw - 8;
        if (y + th > wr.height) y = clientY - wr.top - th - 8;
        if (x < 0) x = 4;
        if (y < 0) y = 4;
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
        tooltip.classList.add('visible');
      }
      function hideTooltip() { tooltip.classList.remove('visible'); }

      positioned.forEach(p => {
        const { src, y, right, angle, boneLen } = p;
        const color = LANE_COLORS[src.lane] || TYPE_COLORS[src.type] || 'var(--fg-muted)';
        const isActive = activeSource === src.id;
        const dirX = right ? 1 : -1;
        const dx = dirX * boneLen * Math.cos(angle);
        const dy = boneLen * Math.sin(angle) * 0.4;
        const endX = SPINE_X + dx;
        const endY = y + dy;

        svg.appendChild(svgEl('line', {
          x1: SPINE_X, y1: y, x2: endX, y2: endY,
          class: 'bone' + (isActive ? ' active' : ''), 'data-id': src.id
        }));

        // Spine marker: ⚔ schools, ◆ people, ● competitions (red), ● events/artifacts
        const isSchool = src.lane === 'school';
        const isPerson = src.lane === 'person';
        const isCompetition = src.lane === 'competition';
        let dotEl;

        if (isSchool) {
          dotEl = svgEl('circle', {
            cx: SPINE_X, cy: y, r: isActive ? 7 : 5.5, fill: color,
            stroke: '#fff', 'stroke-width': 1,
            class: 'spine-dot' + (isActive ? ' active' : ''), 'data-id': src.id,
            style: 'cursor:pointer'
          });
        } else if (isPerson) {
          const r = isActive ? 7 : 5;
          dotEl = svgEl('polygon', {
            points: `${SPINE_X},${y-r} ${SPINE_X+r},${y} ${SPINE_X},${y+r} ${SPINE_X-r},${y}`,
            fill: color,
            class: 'spine-dot' + (isActive ? ' active' : ''),
            'data-id': src.id,
            style: 'cursor:pointer'
          });
        } else if (isCompetition) {
          // Red filled circle, slightly larger
          dotEl = svgEl('circle', {
            cx: SPINE_X, cy: y, r: isActive ? 7 : 5.5, fill: color,
            stroke: '#fff', 'stroke-width': 1.5,
            class: 'spine-dot' + (isActive ? ' active' : ''), 'data-id': src.id,
            style: 'cursor:pointer'
          });
        } else {
          dotEl = svgEl('circle', {
            cx: SPINE_X, cy: y, r: isActive ? 6 : 4, fill: color,
            class: 'spine-dot' + (isActive ? ' active' : ''), 'data-id': src.id,
            style: 'cursor:pointer'
          });
        }

        dotEl.addEventListener('click', () => { showInfluenceLines(src.id); showSourceOverlay(src.id); });
        // Hover date label on spine marker
        let dotLabel = null;
        dotEl.addEventListener('mouseenter', () => {
          dotLabel = svgEl('text', {
            x: SPINE_X, y: y - (isSchool ? 12 : 10),
            'text-anchor': 'middle',
            style: 'font-size:9px;font-weight:600;fill:var(--accent);pointer-events:none;font-family:var(--font-mono)'
          });
          dotLabel.textContent = src.date_display;
          svg.appendChild(dotLabel);
        });
        dotEl.addEventListener('mouseleave', () => {
          if (dotLabel && dotLabel.parentNode) dotLabel.parentNode.removeChild(dotLabel);
          dotLabel = null;
        });
        svg.appendChild(dotEl);

        const g = svgEl('g', { class: 'node-group' + (isActive ? ' active' : ''), 'data-id': src.id });

        // Use Japanese name as primary label, or fall back to short title
        const jpName = src.name_japanese || '';
        const hasThumb = !!src.image;

        if (hasThumb) {
          const thumbX = right ? endX + 4 : endX - THUMB_SIZE - 4;
          const thumbY = endY - THUMB_SIZE / 2;
          const clipId = 'vc-' + src.id.replace(/[^a-z0-9]/g, '');
          const defs = svgEl('defs', {});
          const cp = svgEl('clipPath', { id: clipId });
          cp.appendChild(svgEl('rect', { x: thumbX, y: thumbY, width: THUMB_SIZE, height: THUMB_SIZE, rx: 3, ry: 3 }));
          defs.appendChild(cp);
          g.appendChild(defs);
          g.appendChild(svgEl('rect', {
            x: thumbX, y: thumbY, width: THUMB_SIZE, height: THUMB_SIZE, rx: 3, ry: 3,
            fill: 'none', stroke: 'var(--rule)', 'stroke-width': 1, class: 'card-bg'
          }));
          g.appendChild(svgEl('image', {
            href: DATA.meta.image_dir + src.image,
            x: thumbX, y: thumbY, width: THUMB_SIZE, height: THUMB_SIZE,
            'clip-path': `url(#${clipId})`, preserveAspectRatio: 'xMidYMid slice'
          }));
          const labelX = right ? thumbX + THUMB_SIZE + 5 : thumbX - 5;
          const anchor = right ? 'start' : 'end';
          // Japanese name
          if (jpName) {
            const jt = svgEl('text', { x: labelX, y: thumbY + 14, 'text-anchor': anchor, class: 'node-label-jp' });
            jt.textContent = jpName;
            g.appendChild(jt);
          }
          const dt = svgEl('text', { x: labelX, y: thumbY + (jpName ? 27 : 14), 'text-anchor': anchor, class: 'node-date' });
          dt.textContent = src.date_display;
          g.appendChild(dt);
        } else {
          const dotX = right ? endX + 10 : endX - 10;
          g.appendChild(svgEl('circle', { cx: dotX, cy: endY, r: 5, fill: color, opacity: 0.6 }));
          const labelX = right ? dotX + 10 : dotX - 10;
          const anchor = right ? 'start' : 'end';
          if (jpName) {
            const jt = svgEl('text', { x: labelX, y: endY + 4, 'text-anchor': anchor, class: 'node-label-jp' });
            jt.textContent = jpName;
            g.appendChild(jt);
          } else {
            const lbl = svgEl('text', { x: labelX, y: endY + 3, 'text-anchor': anchor, class: 'node-label' });
            lbl.textContent = (src.author || src.title.substring(0, MAX_LABEL_CHARS));
            g.appendChild(lbl);
          }
          const dt = svgEl('text', { x: labelX, y: endY + (jpName ? 17 : 14), 'text-anchor': anchor, class: 'node-date' });
          dt.textContent = src.date_display;
          g.appendChild(dt);
        }

        // Hover: tooltip only. Click: show influence lines + overlay card.
        g.addEventListener('mouseenter', (e) => showTooltip(src, e.clientX, e.clientY));
        g.addEventListener('mousemove', (e) => showTooltip(src, e.clientX, e.clientY));
        g.addEventListener('mouseleave', () => hideTooltip());
        g.addEventListener('click', () => {
          hideTooltip();
          showInfluenceLines(src.id);
          showSourceOverlay(src.id);
        });
        svg.appendChild(g);
      });

      // ── Influence Lines (on hover only) ──────────
      // Build position map for influence line drawing
      const posMap = {};
      positioned.forEach(p => {
        const dirX = p.right ? 1 : -1;
        const dx2 = dirX * p.boneLen * Math.cos(p.angle);
        const dy2 = p.boneLen * Math.sin(p.angle) * 0.4;
        posMap[p.src.id] = {
          spineX: SPINE_X,
          spineY: p.y,
          endX: SPINE_X + dx2,
          endY: p.y + dy2,
          right: p.right
        };
      });

      // Group influences by target
      const influencesByTarget = {};
      const influencesBySource = {};
      if (DATA.meta.influences) {
        DATA.meta.influences.forEach(inf => {
          if (!influencesByTarget[inf.to]) influencesByTarget[inf.to] = [];
          influencesByTarget[inf.to].push(inf);
          if (!influencesBySource[inf.from]) influencesBySource[inf.from] = [];
          influencesBySource[inf.from].push(inf);
        });
      }

      let activeInfluenceEls = [];

      function showInfluenceLines(sourceId) {
        hideInfluenceLines();
        // Show lines where this source is the TARGET (incoming influences)
        const incoming = influencesByTarget[sourceId] || [];
        // Also show lines where this source is the SOURCE (outgoing influences)
        const outgoing = influencesBySource[sourceId] || [];
        const allLines = [...incoming.map(inf => ({ ...inf, direction: 'incoming' })),
                          ...outgoing.map(inf => ({ ...inf, direction: 'outgoing' }))];

        if (allLines.length === 0) return;

        allLines.forEach(inf => {
          const from = posMap[inf.from];
          const to = posMap[inf.to];
          if (!from || !to) return;

          // Start from source's label end (end of bone)
          const startX = from.endX;
          const startY = from.endY;
          // End at target's label end (end of bone) for people, spine dot for schools
          const toSrc = DATA.sources.find(s => s.id === inf.to);
          const toIsPerson = toSrc && toSrc.lane === 'person';
          const endX = toIsPerson ? to.endX : to.spineX;
          const endY = toIsPerson ? to.endY : to.spineY;

          const midY = (startY + endY) / 2;
          // Curve direction: away from spine, on the side that has more room
          const avgX = (startX + endX) / 2;
          const curveDir = avgX >= SPINE_X ? 1 : -1;
          const maxCurve = isMobile ? VIEW_W * 0.15 : VIEW_W * 0.25;
          const curveStrength = Math.min(Math.abs(endY - startY) * 0.35, maxCurve);
          // Clamp control point inside viewBox
          const cpXRaw = SPINE_X + curveDir * curveStrength;
          const cpX = Math.max(15, Math.min(VIEW_W - 15, cpXRaw));
          const cpY = midY;

          // Animated path
          const path = svgEl('path', {
            d: `M ${startX} ${startY} Q ${cpX} ${cpY} ${endX} ${endY}`,
            class: 'influence-line',
            style: 'opacity:0;transition:opacity 0.3s'
          });
          svg.appendChild(path);
          requestAnimationFrame(() => path.style.opacity = '0.7');
          activeInfluenceEls.push(path);

          // Arrowhead
          const arrowSize = 4;
          const adx = endX - cpX, ady = endY - cpY;
          const alen = Math.sqrt(adx*adx + ady*ady) || 1;
          const ux = adx/alen, uy = ady/alen;
          const px = -uy, py = ux;
          const ax = endX - ux*arrowSize*2, ay = endY - uy*arrowSize*2;
          const arrow = svgEl('polygon', {
            points: `${endX},${endY} ${ax + px*arrowSize},${ay + py*arrowSize} ${ax - px*arrowSize},${ay - py*arrowSize}`,
            class: 'influence-arrow',
            style: 'opacity:0;transition:opacity 0.3s'
          });
          svg.appendChild(arrow);
          requestAnimationFrame(() => arrow.style.opacity = '0.7');
          activeInfluenceEls.push(arrow);

          // Label
          if (inf.label) {
            const lx = (startX + cpX + endX) / 3;
            const ly = (startY + cpY + endY) / 3 - 3;
            const lbl = svgEl('text', {
              x: lx, y: ly,
              'text-anchor': curveDir > 0 ? 'start' : 'end',
              class: 'influence-label',
              style: 'opacity:0;transition:opacity 0.3s'
            });
            lbl.textContent = inf.label;
            svg.appendChild(lbl);
            requestAnimationFrame(() => lbl.style.opacity = '0.7');
            activeInfluenceEls.push(lbl);
          }

          // Highlight source/target dots
          const highlightId = inf.direction === 'incoming' ? inf.from : inf.to;
          const highlightDot = svg.querySelector(`.spine-dot[data-id="${highlightId}"]`);
          if (highlightDot) {
            highlightDot.setAttribute('r', '8');
            highlightDot._origR = highlightDot.getAttribute('r');
            activeInfluenceEls.push({ restore: () => highlightDot.setAttribute('r', '5.5') });
          }
        });
      }

      function hideInfluenceLines() {
        activeInfluenceEls.forEach(el => {
          if (el.restore) { el.restore(); return; }
          if (el.parentNode) el.parentNode.removeChild(el);
        });
        activeInfluenceEls = [];
      }

      // Click on empty spine area clears influence lines
      svg.addEventListener('click', (e) => {
        if (e.target === svg || e.target.classList.contains('spine')) {
          hideInfluenceLines();
        }
      });

      // Expose for use outside renderTimeline scope
      window._showInfluenceLines = showInfluenceLines;
      window._hideInfluenceLines = hideInfluenceLines;
    }

    /* ── Source Overlay ─────────────────────────────── */
    function showSourceOverlay(sourceId) {
      const src = DATA.sources.find(s => s.id === sourceId);
      if (!src) return;
      activeSource = sourceId;
      document.body.classList.add('overlay-open');

      document.querySelectorAll('.node-group').forEach(g => g.classList.toggle('active', g.dataset.id === sourceId));
      document.querySelectorAll('.spine-dot').forEach(d => {
        d.classList.toggle('active', d.dataset.id === sourceId);
        d.setAttribute('r', d.dataset.id === sourceId ? 7 : 5);
      });
      document.querySelectorAll('.bone').forEach(b => b.classList.toggle('active', b.dataset.id === sourceId));

      let passageHTML = '';
      if (src.passage_japanese || src.passage_translation) {
        passageHTML = `
          <div class="source-passage">
            ${src.passage_japanese ? `<div class="japanese-text jp-text">${src.passage_japanese}</div>` : ''}
            ${src.passage_translation ? `<div class="translation-text">${src.passage_translation}</div>` : ''}
            ${src.translator ? `<div class="translator-credit">— ${src.translator}</div>` : ''}
          </div>`;
      }

      const techniquesHTML = (src.techniques_shown || []).map(t =>
        `<span class="tag technique-tag">${t.replace(/_/g, ' ')}</span>`
      ).join('');

      const termsHTML = (src.terms || []).map(t => {
        const lex = DATA.lexicon.find(l => l.id === t);
        return lex ? `<a class="tag term-tag" onclick="navigateToLexicon('${t}')">${lex.japanese} ${lex.romaji}</a>` : '';
      }).join('');

      const evidenceHTML = src.evidence ? `
        <div class="evidence-block">
          <h4>Evidentiary value</h4>
          <div><strong style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.04em">Proves:</strong>
            <ul>${src.evidence.proves.map(p => `<li class="proves">${p}</li>`).join('')}</ul></div>
          <div><strong style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.04em;color:var(--fg-muted)">Cannot prove:</strong>
            <ul>${src.evidence.cannot_prove.map(p => `<li class="cannot-prove">${p}</li>`).join('')}</ul></div>
          <div class="reliability">${src.evidence.reliability}</div>
        </div>` : '';

      const sourceURLHTML = src.source_url
        ? `<a href="${src.source_url}" target="_blank" rel="noopener" class="source-link-ext">View primary source text &#8599;</a>` : '';

      const periodInfo = src.period_display || src.date_display;
      const meta = [src.type + ' · ' + src.subtype, periodInfo, src.museum, src.accession, src.author].filter(Boolean);

      const practHTML = src.practitioners
        ? `<div style="font-family:var(--font-ui);font-size:0.75rem;color:var(--accent);margin-bottom:var(--sm);padding:4px 8px;background:rgba(139,69,19,0.05);border-radius:4px;border:1px solid rgba(139,69,19,0.12)">
            <strong style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.04em">Current practitioners:</strong> ${src.practitioners}
          </div>`
        : (src.active_period && !src.active_period.extant
          ? `<div style="font-family:var(--font-ui);font-size:0.75rem;color:var(--fg-muted);margin-bottom:var(--sm);padding:4px 8px;background:var(--bg-panel);border-radius:4px;border:1px solid var(--rule);font-style:italic">
              Extinct — ${periodInfo}
            </div>`
          : '');

      document.getElementById('overlay-container').innerHTML = `
        <div class="overlay-backdrop" onclick="if(event.target===this)closeSourceOverlay()">
          <div class="overlay-card">
            <button class="overlay-close" onclick="closeSourceOverlay()" aria-label="Close">&times;</button>
            ${src.image ? `<img src="${DATA.meta.image_dir}${src.image}" alt="${src.title}">` : ''}
            <h3 class="source-title">${src.title}</h3>
            <div class="source-meta">${meta.map(m => `<span>${m}</span>`).join('')}</div>
            ${practHTML}
            <div class="source-description">${src.description}</div>
            ${passageHTML}
            ${techniquesHTML || termsHTML ? `
              <div style="margin-bottom:var(--sm)">
                ${techniquesHTML ? `<div class="tag-row">${techniquesHTML}</div>` : ''}
                ${termsHTML ? `<div class="tag-row">${termsHTML}</div>` : ''}
              </div>` : ''}
            ${sourceURLHTML}
            ${evidenceHTML}
          </div>
        </div>`;
    }

    function closeSourceOverlay() {
      activeSource = null;
      document.getElementById('overlay-container').innerHTML = '';
      document.body.classList.remove('overlay-open');
      document.querySelectorAll('.node-group').forEach(g => g.classList.remove('active'));
      document.querySelectorAll('.spine-dot').forEach(d => { d.classList.remove('active'); d.setAttribute('r', 5); });
      document.querySelectorAll('.bone').forEach(b => b.classList.remove('active'));
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape' && activeSource) closeSourceOverlay(); });

    /* ── Evidence Index ─────────────────────────────── */
    function renderEvidenceIndex() {
      const claims = {};
      DATA.sources.forEach(src => {
        if (!src.evidence) return;
        src.evidence.proves.forEach(claim => {
          if (!claims[claim]) claims[claim] = [];
          claims[claim].push(src);
        });
      });
      const container = document.getElementById('evidence-index');
      if (Object.keys(claims).length === 0) return;
      container.style.display = 'block';
      let html = '<h3>Evidence Index</h3>';
      Object.entries(claims).sort((a, b) => b[1].length - a[1].length).forEach(([claim, sources]) => {
        const links = sources.map(s =>
          `<a onclick="showSourceOverlay('${s.id}')">${s.author || s.title.split('—')[0].trim()}</a>`
        ).join(', ');
        html += `<div class="evidence-index-item"><span class="claim">${claim}</span> <span class="citing">— ${links}</span></div>`;
      });
      container.innerHTML = html;
    }

    /* ── Lexicon ───────────────────────────────────── */
    let lexFilter = 'all';

    function renderLexicon() {
      const categories = ['all', ...new Set(DATA.lexicon.map(l => l.category))];
      const filtersEl = document.getElementById('lex-filters');
      filtersEl.innerHTML = categories.map(c =>
        `<button class="filter-btn ${c === 'all' ? 'active' : ''}" data-cat="${c}">${c}</button>`
      ).join('');
      filtersEl.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          lexFilter = btn.dataset.cat;
          filterLexicon();
        });
      });
      document.getElementById('lex-search').addEventListener('input', filterLexicon);
      filterLexicon();
    }

    function filterLexicon() {
      const query = document.getElementById('lex-search').value.toLowerCase();
      const grid = document.getElementById('lex-grid');
      const visible = DATA.lexicon.filter(lex => {
        if (lexFilter !== 'all' && lex.category !== lexFilter) return false;
        if (query) {
          const searchable = [lex.japanese, lex.romaji, lex.literal, lex.definition, lex.modern_parallel].join(' ').toLowerCase();
          if (!searchable.includes(query)) return false;
        }
        return true;
      });

      grid.innerHTML = visible.map(lex => {
        const sourceLinks = (lex.sources || []).map(sid => {
          const src = DATA.sources.find(s => s.id === sid);
          if (!src) return '';
          const label = src.author || src.title.split('—')[0].trim().substring(0, 25);
          return `<a class="lex-source-link" onclick="navigateToSource('${sid}')">${label}</a>`;
        }).join('');

        return `
          <div class="lex-card" data-id="${lex.id}">
            <span class="lex-category">${lex.category}</span>
            <div class="lex-japanese">${lex.japanese}</div>
            <div class="lex-romaji">${lex.romaji}</div>
            <div class="lex-literal">"${lex.literal}"</div>
            <div class="lex-definition">${lex.definition}</div>
            <div class="lex-modern">${lex.modern_parallel}</div>
            ${sourceLinks ? `<div class="lex-sources">${sourceLinks}</div>` : ''}
          </div>
        `;
      }).join('');

      document.getElementById('lex-count').textContent = `${visible.length} of ${DATA.lexicon.length} terms`;
    }

    /* ── Centerpiece: Kano Synthesis ───────────────── */
    function renderCenterpiece() {
      const cp = DATA.centerpiece;
      document.getElementById('centerpiece-intro').innerHTML = `<p>${cp.event}</p>`;

      // Desktop matrix
      const table = document.getElementById('centerpiece-matrix');
      let thead = '<thead><tr><th></th>';
      cp.accounts.forEach(acc => {
        thead += `<th>
          <a class="author-link" onclick="navigateToSource('${acc.id}')">${acc.author}</a>
          <span class="work-title">${acc.work}</span>
          <span class="mode-label">${acc.mode}</span>
        </th>`;
      });
      thead += '</tr></thead>';

      let tbody = '<tbody>';
      cp.technique_slots.forEach(slot => {
        tbody += `<tr><td class="slot-label">${slot.slot}</td>`;
        const keys = ['tenjin_shinyo_ryu', 'kito_ryu', 'fusen_ryu_challenge', 'kodokan_founding', 'maeda_mitsuyo'];
        keys.forEach(key => {
          const text = slot[key];
          if (!text) {
            tbody += '<td class="empty-cell">—</td>';
          } else {
            tbody += `<td>${text}</td>`;
          }
        });
        tbody += '</tr>';
      });
      tbody += '</tbody>';
      table.innerHTML = thead + tbody;

      // Mobile cards
      const cards = document.getElementById('centerpiece-cards');
      const keys = ['tenjin_shinyo_ryu', 'kito_ryu', 'fusen_ryu_challenge', 'kodokan_founding', 'maeda_mitsuyo'];
      const keyLabels = {
        'tenjin_shinyo_ryu': "Tenjin Shin'yō-ryū",
        'kito_ryu': 'Kitō-ryū',
        'fusen_ryu_challenge': 'Fusen-ryū',
        'kodokan_founding': "Kano's own voice",
        'maeda_mitsuyo': "Maeda's extension"
      };
      cards.innerHTML = cp.technique_slots.map(slot => {
        const passages = keys.filter(k => slot[k]).map(k =>
          `<div class="matrix-card-passage">
            <div class="matrix-card-author">${keyLabels[k]}</div>
            <div class="matrix-card-text">${slot[k]}</div>
          </div>`
        ).join('');
        return `<div class="matrix-card"><h4>${slot.slot}</h4>${passages}</div>`;
      }).join('');
    }

    /* ── Scroll to Source & Highlight ────────────────── */
    function scrollToSourceAndShow(sourceId) {
      // Find the node group on the SVG
      const g = document.querySelector(`.node-group[data-id="${sourceId}"]`);
      const dot = document.querySelector(`.spine-dot[data-id="${sourceId}"]`);

      if (g) {
        // Scroll the node into view
        g.scrollIntoView({ behavior: 'smooth', block: 'center' });

        // Flash highlight: temporarily enlarge and pulse the node
        g.classList.add('active');
        if (dot) {
          dot.classList.add('active');
          const origR = dot.getAttribute('r');
          dot.setAttribute('r', '10');
          setTimeout(() => dot.setAttribute('r', origR), 1500);
        }

        // Show influence lines
        if (window._showInfluenceLines) window._showInfluenceLines(sourceId);

        // Open the overlay after a brief scroll delay
        setTimeout(() => showSourceOverlay(sourceId), 400);
      } else {
        showSourceOverlay(sourceId);
      }
    }

    /* ── Source Search ──────────────────────────────── */
    function initSourceSearch() {
      const input = document.getElementById('source-search');
      const results = document.getElementById('source-results');
      const count = document.getElementById('source-count');

      input.addEventListener('input', () => {
        const q = input.value.toLowerCase().trim();
        if (!q) {
          results.style.display = 'none';
          count.textContent = '';
          return;
        }
        const matches = DATA.sources.filter(src => {
          const searchable = [
            src.title, src.name_japanese || '', src.description,
            src.date_display, src.author || '',
            (src.techniques_shown || []).join(' '),
            (src.terms || []).join(' '),
            src.passage_translation || '', src.passage_japanese || '',
            src.practitioners || '', src.period_display || ''
          ].join(' ').toLowerCase();
          return searchable.includes(q);
        });

        count.textContent = `${matches.length} of ${DATA.sources.length}`;

        if (matches.length === 0) {
          results.innerHTML = '<div style="font-family:var(--font-ui);font-size:0.82rem;color:var(--fg-faint);padding:var(--sm)">No matches</div>';
          results.style.display = 'block';
          return;
        }

        results.innerHTML = matches.map(src => {
          const jp = src.name_japanese || '';
          const title = (src.title.split('—')[0] || '').trim();
          const lane = src.lane || '';
          const icon = lane === 'school' ? '⚔' : lane === 'person' ? '◆' : '●';
          return `<div style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;margin:2px;border:1px solid var(--rule);border-radius:14px;cursor:pointer;font-family:var(--font-ui);font-size:0.75rem;transition:all 0.15s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--rule)'" onclick="scrollToSourceAndShow('${src.id}')">
            <span style="font-size:0.65rem">${icon}</span>
            <span style="font-family:var(--font-jp)">${jp}</span>
            <span style="color:var(--fg-muted)">${title}</span>
            <span style="color:var(--fg-faint);font-size:0.65rem">${src.date}</span>
          </div>`;
        }).join('');
        results.style.display = 'block';
      });
    }

    /* ── Launch ─────────────────────────────────────── */
